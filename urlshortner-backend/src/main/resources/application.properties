spring.application.name=urlshortener

spring.datasource.url=jdbc:mysql://localhost:3306/url_shortner_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=change-this-jwt-secret-to-a-long-random-value-at-least-64-characters-long-1234567890
jwt.expiration=86400000

#redis details
spring.redis.host=localhost        # or redis container name / IP
spring.redis.port=6379
spring.redis.timeout=2000ms

